const {useState,useEffect,useMemo,useRef,useCallback,useReducer}=React;
const fmt = v => {
  if (!v && v !== 0) return "0원";
  const n = Math.round(v);
  if (n >= 100000000) {
    const a = Math.floor(n / 100000000);
    const r = n % 100000000;
    if (!r) return `${a}억원`;
    const m = Math.round(r / 10000);
    return `${a}억 ${m.toLocaleString()}만원`;
  }
  if (n >= 10000) return `${Math.round(n / 10000).toLocaleString()}만원`;
  return `${n.toLocaleString()}원`;
};
const py = sqm => (sqm / 3.3058).toFixed(1);
const dateStr = d => {
  const dt = new Date(d);
  return `${dt.getMonth() + 1}월 ${dt.getDate()}일`;
};
const dday = d => {
  const diff = Math.ceil((new Date(d) - new Date()) / 86400000);
  if (diff < 0) return "마감";
  if (diff === 0) return "오늘";
  return `D-${diff}`;
};
// ── 줍줍파인더 API 연동 ──────────────────────────────────────
const API_BASE = "https://jupjup-finder-production.up.railway.app";

// API 데이터 → 화면 형식으로 변환
function apiItemToProperty(item) {
  const regionCode = item.zone || "";
  const region = regionCode === "capital" ? "reg" : regionCode === "non_capital" ? "nreg" : "local";
  return {
    id: item.caseId || item.productId,
    caseId: item.caseId,
    region,
    type: item.propertyType || "아파트",
    address: item.address || "",
    caseNo: item.caseNo || "",
    appraisedValue: (item.appraise || 0) * 10000,
    minBid: (item.minBid || 0) * 10000,
    recommendedBid: (item.expectedBidPrice || item.minBid || 0) * 10000,
    officialPrice: item.officialPriceWon || null,
    area: item.area || 0,
    floor: 0,
    totalFloor: 0,
